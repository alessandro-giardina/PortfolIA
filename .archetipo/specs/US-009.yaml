body: |-
  #### US-009: Recuperare la serie storica dei prezzi con cache su SQLite

  **Epic:** EP-002 | **Priorità:** HIGH | **Punti:** 5 | **Stato:** TODO
  **Bloccata da:** US-007

  **User Story**
  Come Alessandro, investitore-proprietario,
  voglio che l'app recuperi la serie storica dei prezzi di un titolo e la memorizzi in cache localmente,
  in modo da abilitare i calcoli storici e i grafici riducendo le richieste alla fonte (FR-018, ADR-005).

  **Dimostra**
  Dopo l'implementazione di questa spec, alla prima richiesta la serie storica di un ISIN viene recuperata dalla fonte e salvata su SQLite; una seconda richiesta per lo stesso ISIN/orizzonte è servita dalla cache senza nuove chiamate alla fonte.

  **Criteri di Accettazione**
  - [ ] L'adapter recupera la serie storica dei prezzi per un ISIN seguendo il percorso ricerca → scheda strumento → serie storica
  - [ ] La serie storica recuperata è persistita in cache su SQLite
  - [ ] Una richiesta successiva per dati già in cache è servita senza nuova chiamata alla fonte
  - [ ] Gli intervalli storici non disponibili sono marcati come tali e non interpolati
