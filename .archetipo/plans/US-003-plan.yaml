spec_code: US-003
body: |-
  # US-003: Setup del testing con smoke test end-to-end — Piano di Implementazione

  **Generato da:** ARchetipo Planning Team
  **Data:** 2026-06-27

  ---

  ## Spec

  **Epic:** EP-000 — Fondazione del progetto
  **Priorità:** HIGH | **Punti:** 2

  **User Story**
  Come sviluppatore di PortfolIA,
  voglio una suite di test configurata con Vitest (unit/integration) e Playwright (E2E) e uno smoke test che passa,
  in modo da poter verificare in modo affidabile il comportamento del codice durante tutto lo sviluppo.

  **Criteri di Accettazione**
  - [ ] Vitest è configurato e un test unitario di esempio passa
  - [ ] Playwright è configurato e uno smoke test E2E sulla pagina iniziale passa
  - [ ] Esiste un comando di progetto che esegue lint, type-check e test
  - [ ] La documentazione minima (README/CLAUDE.md) spiega come avviare ed eseguire i test

  ---

  ## Soluzione Tecnica

  L'infrastruttura di test è già parzialmente presente: Vitest è installato nel package `server` con due test funzionanti (`health.test.ts`, `db.test.ts`), Playwright è installato a radice con `playwright.config.ts` e uno smoke test in `e2e/`. L'obiettivo è consolidare e completare questa infrastruttura aggiungendo le parti mancanti, senza riscrivere ciò che funziona.

  - **Vitest sul server:** aggiungere un `vitest.config.ts` esplicito nel package `server` per chiarire la configurazione (test dir, environment node, coverage opzionale). I test esistenti (`health.test.ts`, `db.test.ts`) fungono già da test di riferimento.
  - **ESLint (monorepo):** installare ESLint 9+ e configurarlo con flat config (`eslint.config.js`) a radice del monorepo, targeting tutti i package TypeScript. Usare `@eslint/js` + `typescript-eslint` per il preset TS. Il formato flat config è necessario perché il progetto usa `"type":"module"`.
  - **Script radice unificati:** aggiungere nel `package.json` radice gli script `lint` (ESLint), `test` (Vitest su server + eventuale futuro client), e `check` (lint + typecheck + test in sequenza) per soddisfare il criterio di accettazione del comando unificato.
  - **Playwright config — outputDir:** aggiornare `playwright.config.ts` portando `outputDir` da `docs/test-results/US-001/` a `docs/test-results/US-003/`, coerentemente con la spec attuale.
  - **CLAUDE.md:** creare il file `CLAUDE.md` a radice con le istruzioni operative per avviare l'app (`npm run dev`), eseguire i test unitari (`npm run test`), eseguire gli E2E (`npx playwright test`), e il comando completo di verifica (`npm run check`).

  ---

  ## Strategia di Test

  L'obiettivo è che al termine dello smoke test sia verificabile con un singolo comando che tutto il progetto è correttamente configurato.

  - **Test unitari (Vitest, server):** `health.test.ts` e `db.test.ts` già presenti servono come test di riferimento; il task di configurazione Vitest verifica che passino con `npm run test` a radice.
  - **Test di integrazione:** non richiesti per questa spec; i test esistenti coprono già l'integrazione DB.
  - **Lint e type-check:** il comando `npm run check` deve uscire con codice 0 sull'intero monorepo.
  - **E2E smoke test:** lo scenario esistente in `e2e/demo__scaffolding-health-check.spec.ts` verifica che la pagina iniziale si carichi e che il backend sia raggiungibile — è il caso d'uso minimo richiesto dalla spec.

  ### Test E2E — Simulazione Utente

  **Framework:** Playwright (già installato e configurato)
  **Video recording:** Solo lo scenario demo (video: 'on' già impostato nel file spec); salvato in `docs/test-results/US-003/`

  | Scenario | Descrizione del flusso utente |
  |---|---|
  | Smoke — pagina iniziale | Lo sviluppatore apre `http://localhost:5173`, vede il titolo 'PortfolIA', la conferma 'Backend raggiungibile' e lo status ok del backend |

  ---

  _Piano generato tramite ARchetipo Planning — 2026-06-27_
