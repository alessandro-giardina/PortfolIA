body: |
  # US-024: Recupero anagrafica di backup MorningStar via browser headless e API JSON ‚ÄĒ Implementation Plan

  **Generato da:** ARchetipo Planning Team
  **Data:** 2026-06-28

  ---

  ## Spec

  **Epic:** EP-002 ‚ÄĒ Ricerca titoli e dati di mercato
  **Priorit√†:** HIGH | **Punti:** 5
  **Sostituisce:** US-021

  **User Story**
  Come sviluppatore di PortfolIA, voglio che l'adapter di backup MorningStar recuperi l'anagrafica di un titolo per ISIN tramite un browser headless (Playwright) sul sito raggiungibile `www.morningstar.com`, intercettando le risposte JSON delle API `us-api.morningstar.com/sal-service`, in modo da rendere realmente funzionante il fallback di backup in produzione (lo scraping HTTP statico di US-021 √® bloccato dal muro anti-bot Akamai).

  **Criteri di Accettazione**
  - Adapter riscritto con browser headless (flag anti-automazione + warm-up sulla home), stesso esito discriminato `found`/`not-found`/`error` intercambiabile con Borsa Italiana.
  - Naviga su `www.morningstar.com`, risolve l'ISIN nella scheda strumento, popola i campi intercettando il JSON `sal-service` (+ denominazione da `h1`); campi non disponibili = `null`; testi in inglese accettati.
  - Verifica che lo strumento risolto contenga l'ISIN richiesto prima di accettare `found`.
  - Timeout/blocco/markup inatteso degradano in `not-found`/`error`, coperti da test con un nuovo seam iniettabile (renderer mockato), senza browser reale nei test unitari.
  - Dipendenza browser dichiarata come runtime del server; costi noti documentati.
  - US-021 dichiarata superata.

  ---

  ## Technical Solution

  Isoliamo tutta la fragilit√† non deterministica del browser dietro un singolo seam, mantenendo il parser puro e il contratto adapter invariato, cos√¨ che il fallback in `securities.ts` (US-022) continui a funzionare senza modifiche e i test unitari restino veloci e senza rete.

  - **Nuovo seam `MorningStarRenderer`** (`server/src/market/morningStarBrowser.ts`): funzione `(isin) => Promise<MorningStarBundle | null>` che incapsula l'intero giro browser. Restituisce un *bundle* normalizzato `{ instrumentUrl, h1, isinPresent, sal }` dove `sal` raccoglie i payload JSON intercettati da `us-api.morningstar.com/sal-service`. Ritorna `null` quando nessuno strumento √® risolto; lancia su blocco/timeout (mappato a `error` dall'adapter).
  - **Flusso browser:** Chromium headless con `--disable-blink-features=AutomationControlled` e `navigator.webdriver` mascherato; navigazione di **warm-up** su `https://www.morningstar.com/` per acquisire il cookie Akamai; poi `GET /search?query=<ISIN>`; estrazione del primo link strumento `/(funds|etfs|stocks)/_/<secid>/quote`; navigazione alla scheda con **intercettazione** delle risposte `response` JSON `sal-service`; lettura di `h1` e verifica che il body/scheda contenga l'ISIN.
  - **Ciclo di vita:** browser come **singleton lazy** condiviso, **un context nuovo per lookup** (isolamento cookie + warm-up), chiuso a fine lookup; browser chiuso allo shutdown del processo. Timeout per navigazione via opzione, default ~12s.
  - **Parser puro riscritto** (`morningStarParser.ts`): `parseMorningStar(bundle, isin) => SecurityInfo`. Mappa dal JSON `sal-service`: `baseCurrency` ‚Üí `currency`, `categoryName` ‚Üí `segment`, `securityType`/segmento URL (`funds`/`etfs`/`stocks`) ‚Üí `instrumentType`; `name` dall'`h1`. `price`/NAV: non esposto da un endpoint JSON pulito ‚Üí best-effort dall'header DOM dello strumento, `null` se non interpretabile. `ticker`, `totalAnnualFees`, `dividendPolicy`, `issuer` ‚Üí `null` quando non presenti (mai stimati, FR-006/ADR-003).
  - **Adapter riscritto** (`morningStarAdapter.ts`): `fetchSecurityByIsin` usa il `renderer` iniettabile (default = renderer reale). `null` ‚Üí `not-found`; `isinPresent === false` ‚Üí `not-found` (anti-titolo-errato); `bundle` ‚Üí parser; se `name` e `price` entrambi `null` ‚Üí `not-found`; eccezioni ‚Üí `error`. Mantiene `AdapterResult`/`AdapterOptions` esportati e la firma usata da `securities.ts`.
  - **Dipendenza:** aggiunta di `playwright` a `server/package.json` come dependency runtime; costi (Chromium ~300MB, latenza ~8-12s a freddo, affidabilit√† best-effort) documentati in `CLAUDE.md`.
  - **US-021 superata:** la riscrittura rimpiazza in-place il vecchio scraping HTTP statico (URL `#?q=` con fragment, `fetchFn`); il vecchio fixture HTML e i test basati su `fetchFn` vengono sostituiti.

  ---

  ## Test Strategy

  La strategia separa nettamente la logica pura/deterministica (testata in CI) dal giro browser reale (verifica manuale live), cos√¨ che `npm run check` resti verde e non dipendente dalla rete o da Akamai.

  - **Unit parser** (`morningStarParser.test.ts`): con fixture JSON `sal-service` reali catturate, verifica la mappatura completa (`currency`, `segment`, `instrumentType`, `name`) e che i campi assenti risultino `null`.
  - **Unit adapter** (`morningStarAdapter.test.ts` riscritto): renderer mockato per i casi `found`, `not-found` (renderer ‚Üí null), `not-found` per ISIN-mismatch (`isinPresent=false`), `error` (renderer che lancia / timeout), e `not-found` quando `name` e `price` sono entrambi `null`.
  - **Regressione fallback** (`securities` test esistenti): restano verdi ‚ÄĒ BI `found` non interroga MorningStar; BI `not-found` ‚Üí MorningStar `found` con `dataSource = 'morningstar'`.
  - **Smoke live manuale** (fuori dalla suite CI): script che esegue l'adapter reale (browser) contro `IE00BJRHVJ28` e stampa l'esito `found` + fonte; usato in fase di implement/verify per dimostrare il `Demonstrates`. Non aggiunto a Vitest per non rendere la CI flaky.

  _Nessun nuovo E2E/registrazione video: la spec non introduce nuova UI (il badge fonte backup esiste gi√† da US-022)._

  ---

