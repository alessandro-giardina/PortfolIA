    description: Creare il componente React del dialog (inline in SecuritySearchPage o file separato `client/src/components/PortfolioSelectDialog.tsx`). Al momento dell'apertura chiama `GET /api/portfolios`. Mostra la lista con selezione radio (nessuna pre-selezionata); gestisce il caso zero-portafogli con messaggio esplicativo; il bottone Conferma è disabilitato se nessun portafoglio è selezionato. Chiudibile con Escape, clic fuori o bottone Annulla. Usa `role="dialog"`, `aria-modal="true"` e segue l'estetica del mockup in `docs/mockups/US-025/`.
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-02
  - id: TASK-03
    title: Navigazione con state verso PortfolioDetailPage al clic su Conferma
    description: 'Nel gestore del bottone Conferma del dialog, usare `useNavigate` di React Router per navigare verso `/portfolio/:id` con `state: { prefill: { isin, name, price, currency } }`. Il tipo `PrefillState` può essere definito in `shared/types/index.ts` o localmente nel client.'
    type: Impl
    status: DONE
    dependencies:
      - TASK-02
    ref: TASK-03
  - id: TASK-04
    title: Pre-popolamento form di carico in PortfolioDetailPage da navigation state
    description: In PortfolioDetailPage.tsx, leggere `useLocation().state` al primo mount tramite `useEffect`. Se è presente un oggetto `prefill` con `isin` e/o `price`, impostare i rispettivi campi del form (`setIsin`, `setLoadPrice`). Dopo il pre-popolamento, cancellare lo state dalla history con `window.history.replaceState({}, document.title)` per evitare re-populate su ricarica pagina. Il campo data e quantità restano vuoti.
    type: Impl
    status: DONE
    dependencies:
      - TASK-03
    ref: TASK-04
