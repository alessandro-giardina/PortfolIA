spec_code: US-025
body: |-
  # US-025: Aggiungere un titolo ricercato a un portafoglio — Piano di Implementazione

  **Generato da:** ARchetipo Planning Team
  **Data:** 2026-06-28

  ---

  ## Spec

  **Epic:** EP-003 — Gestione delle posizioni
  **Priorità:** HIGH | **Punti:** 3

  **User Story**
  Come Alessandro, investitore-proprietario, voglio poter aggiungere un titolo appena trovato nella ricerca direttamente a uno dei miei portafogli, in modo da avviare il carico senza dover ricopiare manualmente ISIN, nome e prezzo.

  **Criteri di Accettazione**
  - Il bottone "Aggiungi a Portafoglio" è visibile accanto alla sezione "Titolo Trovato" solo quando la ricerca ha prodotto un risultato valido
  - Il dialog mostra la lista di tutti i portafogli esistenti e richiede una selezione esplicita prima di procedere
  - Confermando la selezione, la navigazione porta a `PortfolioDetailPage` del portafoglio scelto
  - Il modulo di carico titolo in `PortfolioDetailPage` è pre-compilato con ISIN, nome del titolo e prezzo corrente recuperati dalla ricerca
  - Se non esistono portafogli, il dialog mostra un messaggio che invita a crearne uno prima di procedere

  ---

  ## Soluzione Tecnica

  Il flusso è interamente frontend: nessuna modifica al backend è necessaria. La comunicazione tra `SecuritySearchPage` e `PortfolioDetailPage` avviene tramite React Router `useNavigate` con `state`, che trasporta i dati del titolo (ISIN, nome, prezzo) senza esporli nell'URL.

  ### Componenti coinvolti

  - **`client/src/pages/SecuritySearchPage.tsx`**: aggiunge il bottone "Aggiungi a Portafoglio" (visibile solo quando `status === 'found'`) e il componente dialog di selezione portafoglio inline.
  - **Dialog di selezione portafoglio**: componente React inline (o file separato `PortfolioSelectDialog.tsx`) che al momento dell'apertura chiama `GET /api/portfolios`, mostra la lista con selezione radio, gestisce il caso zero-portafogli, e su conferma esegue `navigate('/portfolio/:id', { state: { prefill } })`.
  - **`client/src/pages/PortfolioDetailPage.tsx`**: aggiunge un `useEffect` che legge `useLocation().state` al primo mount e, se presenti dati di pre-popolamento, imposta `isin`, `loadPrice` e lascia vuota la data (l'utente deve indicare la data di acquisto).

  ### Meccanismo di pre-popolamento

  - Il campo ISIN viene impostato con l'ISIN del titolo trovato (già validato e normalizzato).
  - Il campo Prezzo di acquisto viene impostato con il prezzo corrente del titolo (`security.price`).
  - Il campo Data di carico viene lasciato vuoto: la data di acquisto è soggettiva e deve essere inserita dall'utente.
  - Il campo Quantità viene lasciato vuoto.
  - Lo state viene consumato una sola volta: dopo il pre-popolamento viene cancellato con `window.history.replaceState({}, '')` per evitare che una ricarica della pagina ripopoli il form.

  ### Interfaccia dati pre-popolamento (navigation state)

  ```typescript
  interface PrefillState {
    isin: string;
    name: string | null;
    price: number | null;
    currency: string | null;
  }
  ```

  ### Gestione zero-portafogli

  Se `GET /api/portfolios` restituisce un array vuoto, il dialog non mostra righe ma un messaggio: "Non hai ancora nessun portafoglio. Torna alla dashboard e creane uno prima di procedere."

  ### Styling e accessibilità

  - Il bottone "Aggiungi a Portafoglio" segue il pattern `className="bottone"` già presente nel progetto.
  - Il dialog segue il pattern già definito nel mockup esistente in `docs/mockups/US-025/`: overlay con backdrop, focus trap (Escape per chiudere), `role="dialog"` e `aria-modal="true"`.
  - Il bottone "Conferma" è disabilitato se nessun portafoglio è selezionato.

  ---

  ## Strategia di Test

  La copertura si concentra sul percorso completo (end-to-end) e sulla logica di pre-popolamento del form.

  - **Test E2E (Playwright)**: percorso demo completo con video; scenario zero-portafogli; verifica che il form sia pre-compilato correttamente dopo la navigazione.
  - **Nessun test di unità aggiuntivo** sul backend (nessuna modifica al backend).
  - **Verifica regressione**: i test E2E esistenti di US-011 (aggiungi posizione) non devono essere compromessi dal pre-popolamento (lo state è opzionale).

  ### Test E2E — Simulazione utente

  **Framework:** Playwright (già configurato nel progetto, `playwright.config.ts`)
  **Video:** solo scenario demo; altri scenari non registrano video

  | Scenario | Flusso utente |
  |---|---|
  | Demo (con video) | Cerca ISIN valido → titolo trovato → clic "Aggiungi a Portafoglio" → dialog aperto → seleziona portafoglio → clic "Conferma" → navigazione a PortfolioDetailPage → form pre-compilato con ISIN e prezzo |
  | Zero portafogli | Cerca ISIN valido → apri dialog → messaggio "nessun portafoglio" visibile, bottone Conferma assente o disabilitato |
  | Chiudi dialog senza navigare | Apri dialog → clic Annulla → rimane sulla pagina di ricerca, il titolo è ancora visibile |

  > Nota: il video è salvato in `docs/test-results/US-025/` (configurato tramite `outputDir` nel test demo, seguendo il pattern degli altri spec E2E del progetto).

  ---

  > Mockup di riferimento disponibili in `docs/mockups/US-025/`

  _Piano generato tramite ARchetipo Planning — 2026-06-28_
