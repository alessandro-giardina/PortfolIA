body: |-
  # US-006: Rinominare ed eliminare un portafoglio — Piano di Implementazione

  **Generato da:** ARchetipo Planning Team
  **Data:** 2026-06-27

  ---

  ## Spec

  **Epic:** EP-001 — Gestione multi-portafoglio
  **Priorità:** MEDIUM | **Punti:** 2

  **User Story**
  Come Alessandro, investitore-proprietario,
  voglio rinominare ed eliminare un portafoglio esistente,
  in modo da mantenere ordinata e aggiornata l'organizzazione dei miei investimenti (FR-003).

  **Criteri di Accettazione**
  - [ ] L'utente può modificare il nome di un portafoglio esistente
  - [ ] L'utente può eliminare un portafoglio previa conferma esplicita
  - [ ] Le modifiche (rinomina/eliminazione) sono persistite e visibili dopo il riavvio

  ---

  ## Soluzione Tecnica

  L'implementazione aggiunge due endpoint REST (`PATCH` e `DELETE`) al file API già esistente e arricchisce la `PortfolioDetailPage` con le azioni di modifica ed eliminazione, senza modifiche allo schema SQLite.

  - **Backend — `PATCH /api/portfolios/:id`:** aggiungere la route in `server/src/api/portfolios.ts`. Valida l'ID (404 se non trovato), il body `{ name }` (400 se vuoto), intercetta l'errore di unicità SQLite restituendo 409 — riciclando la stessa logica già presente nel POST. Restituisce 200 con il portafoglio aggiornato.
  - **Backend — `DELETE /api/portfolios/:id`:** aggiungere la route in `server/src/api/portfolios.ts`. Valida l'ID (404 se non trovato), esegue la DELETE via Drizzle e restituisce 200 `{ deleted: true }`.
  - **Tipi condivisi:** aggiungere `UpdatePortfolioRequest` (con campo `name: string`) in `shared/types/index.ts`.
  - **Frontend — `PortfolioDetailPage.tsx`:** la pagina carica già il portafoglio via `GET /api/portfolios/:id`. Aggiungere: (1) un form inline di rinomina con input pre-popolato, pulsante "Salva", gestione errori inline (vuoto, duplicato); alla risposta 200 aggiornare lo stato locale `portfolio.name` senza navigazione. (2) Un pulsante "Elimina portafoglio" che mostra un dialogo di conferma nativo (`window.confirm`); alla conferma chiama `DELETE /api/portfolios/:id` e — in caso di successo — usa `useNavigate` per tornare a `/`; la lista della `DashboardPage` si aggiornerà automaticamente al mount. Lo stile segue l'estetica libro-mastro già usata nella pagina (Georgia, palette `#221c14` / `#6e5a36` / `#8d231f`).
  - **Nessuna modifica:** schema SQLite, migrazioni Drizzle, `DashboardPage`, `CreatePortfolioForm`.

  ---

  ## Strategia di Test

  Copertura su tre livelli: integrazione Vitest sui due nuovi endpoint, controllo lint+typecheck, E2E Playwright per il flusso utente completo.

  - **Test di integrazione Vitest (`server/tests/api.portfolios.test.ts`):** aggiungere describe block per `PATCH /api/portfolios/:id` — happy path (200 con nome aggiornato), nome vuoto (400), ID inesistente (404), nome duplicato (409); e per `DELETE /api/portfolios/:id` — happy path (200 `{ deleted: true }`), ID inesistente (404), verifica che il portafoglio non compaia più in GET dopo la DELETE.
  - **Lint + typecheck:** `npm run check` deve restare a 0 errori dopo i nuovi file e le modifiche.

  ### Test E2E — Simulazione Utente

  **Framework:** Playwright (già configurato in `playwright.config.ts`)
  **Video recording:** Solo lo scenario demo; video salvato in `docs/test-results/US-006/`

  | Scenario | Descrizione del flusso utente |
  |---|---|
  | Demo — rinomina e poi elimina (con video) | L'utente apre la dashboard, clicca su un portafoglio, rinomina il portafoglio con un nuovo nome e verifica che il titolo si aggiorni inline; poi clicca Elimina, conferma nel dialogo, atterra sulla dashboard e verifica che il portafoglio non sia più in lista |
  | Validazione rinomina — nome vuoto | L'utente svuota il campo nome e clicca Salva; vede il messaggio di errore inline |
  | Validazione rinomina — nome duplicato | L'utente inserisce il nome di un portafoglio già esistente e clicca Salva; vede il messaggio di errore 409 |
  | Eliminazione annullata | L'utente clicca Elimina, annulla nel dialogo di conferma; il portafoglio rimane nella lista |

  ---

